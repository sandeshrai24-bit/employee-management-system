{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3>Onboard Employee</h3>
            <form method="POST">
                <div class="mb-3"><label class="form-label">Name</label><input type="text" name="name" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Department</label><input type="text" name="department" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Role</label><input type="text" name="role" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Annual Salary ($)</label><input type="number" step="0.01" name="salary" class="form-control" required></div>
                <button type="submit" class="btn btn-success w-100">Save Record</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
